<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="
background-color: #aaa;
padding: 50px;
/*
     padding-top, padding-right, padding-bottom, padding-left
 */
margin: 30px;
">이것은 div 입니다</div>
<div style="
background-color: #e06060;
padding: 100px 50px 10px 30px;
">이것은 div 입니다</div>
<!--
       padding / margin : 위 오른쪽 아래 왼쪽 순서 / 시계방향으로 px이 적용됨
                          만약 두가지만 작성할 경우 위/아래 양옆 으로 적용됨
-->
<div style="
background-color: #81d978;
padding-left: 30px;
margin-bottom: 30px;
">이것은 div 입니다</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #d9534f;">1. content-box (기본값)</h3>
    <div style="
         width: 200px;
         height: 100px;
         padding: 20px;
         border: 10px solid #333;
         background-color: #ffcccc;

    ">
        전체 너비 : 260px
    </div>
</div>

<div style="margin-bottom: 50px;">
    <h3 style="color: #d9534f;">2. border-box</h3>
    <div style="
         box-sizing: border-box;
         width: 200px;
         height: 100px;
         padding: 20px;
         border: 10px solid #333;
         background-color: #ffcccc;

    ">
        전체 너비 : 200px
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div style="
             background-color: #aaa;
             width: 300px;
             height: 300px;
             border: 5px solid black;
             border-radius: 100px;
">
</div>

<div style="
background-image: url('images/image.jpg');
width: 600px;
height: 600px;
background-repeat: no-repeat;
">글자를 적습니다</div>

<div style="
background-image: url('images/image.jpg');
width: 600px;
height: 300px;
background-repeat: no-repeat;
background-size: cover;
">글자를 적습니다</div>

<div style="
background-image: url('images/image.jpg');
width: 600px;
height: 300px;
background-repeat: no-repeat;
background-size: contain;
background-position: 100px 100px;
">글자를 적습니다</div>

<!-- cover : 이미지 잘려도 내가 설정한 영역 채우기
   contain : 영역이 비워져도 이미지가 다 보이게 하기
-->

</body>
</html>
